<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Dex Tracker — Premium Dark Mode</title>
<style>
  :root {
    --red: #ff4d4f;
    --red-dark: #d9363e;
    --yellow: #ffec3d;
    --bg-main: #141414;
    --bg-card: #1f1f1f;
    --bg-input: #262626;
    --text: #f5f5f5;
    --text-muted: #8c8c8c;
    --border: #303030;
    --caught-bg: #135200;
    --caught-border: #237804;
    --caught-check: #52c41a;
    --radius: 16px;
    --shadow: 0 8px 24px rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-main); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  /* LINHA DE PROGRESSO SUPERIOR COMPACTA COM GLOW */
  header { background: linear-gradient(180deg, #0d0d0d 0%, #141414 100%); color: white; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.5); border-bottom: 1px solid var(--border); }
  .header-top { display: flex; align-items: center; gap: 16px; padding: 16px 24px 8px; }
  
  .pokeball-icon { width: 34px; height: 34px; background: #fff; border-radius: 50%; position: relative; flex-shrink: 0; box-shadow: 0 0 12px rgba(255,77,79,0.5); animation: floatBall 3s ease-in-out infinite alternate; }
  @keyframes floatBall { from { transform: translateY(0) rotate(0deg); } to { transform: translateY(-2px) rotate(10deg); } }
  .pokeball-icon::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 4px; background: #141414; transform: translateY(-50%); }
  .pokeball-icon::after { content: ''; position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; background: #fff; border: 3px solid #141414; border-radius: 50%; transform: translate(-50%, -50%); }
  
  .header-title h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(90deg, #ff4d4f, #ff7875); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header-title p { font-size: 13px; color: var(--text-muted); }
  
  .progress-bar-wrap { padding: 4px 24px 14px; max-width: 600px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: #a6a6a6; margin-bottom: 6px; font-weight: 600; }
  .progress-track { height: 8px; background: #262626; border-radius: 6px; overflow: hidden; border: 1px solid #3a3a3a; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #52c41a, #73d13d); box-shadow: 0 0 8px rgba(82,196,26,0.5); border-radius: 6px; transition: width 0.6s cubic-bezier(0.25, 1, 0.5, 1); }

  /* ABAS MODERNAS */
  .nav-tabs { display: flex; gap: 6px; padding: 0 24px; }
  .nav-tab { padding: 10px 20px; font-size: 14px; font-weight: 700; color: var(--text-muted); border: none; background: none; cursor: pointer; position: relative; transition: color 0.2s; }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--red); }
  .nav-tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--red); border-radius: 3px 3px 0 0; box-shadow: 0 -2px 10px rgba(255,77,79,0.4); }

  /* PAINEL DE CONTROLE INTEGRADO */
  .controls { background: #171717; border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 260px; }
  .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #595959; }
  .search-wrap input { width: 100%; padding: 10px 14px 10px 40px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; color: var(--text); outline: none; background: var(--bg-input); transition: all 0.2s; }
  .search-wrap input:focus { border-color: var(--red); background: #1f1f1f; box-shadow: 0 0 0 3px rgba(255,77,79,0.15); }
  
  select { padding: 10px 16px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; color: var(--text); background: var(--bg-input); cursor: pointer; outline: none; transition: all 0.2s; }
  select:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(255,77,79,0.15); }
  
  .filter-btns { display: flex; gap: 4px; background: #111; padding: 4px; border-radius: 10px; border: 1px solid var(--border); }
  .filter-btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
  .filter-btn:hover { color: var(--text); }
  .filter-btn.active { background: var(--bg-card); color: var(--red); box-shadow: 0 2px 8px rgba(0,0,0,0.5); }

  /* ÁREA DE CONTEÚDO PRINCIPAL */
  main { padding: 24px; max-width: 1600px; margin: 0 auto; }
  .page { display: none; }
  .page.active { display: block; animation: fadeIn 0.3s ease-out forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  /* SEÇÕES E RESUMOS */
  .gen-section { background: var(--bg-card); padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 24px; }
  .gen-header { display: flex; align-items: center; gap: 16px; margin-bottom: 18px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
  .gen-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .gen-sub { font-size: 12px; font-weight: 700; color: var(--text-muted); background: #262626; padding: 2px 10px; border-radius: 20px; border: 1px solid #333; }
  .gen-progress { flex: 1; height: 6px; background: #262626; border-radius: 3px; overflow: hidden; max-width: 160px; }
  .gen-progress-fill { height: 100%; background: linear-gradient(90deg, #389e0d, #52c41a); border-radius: 3px; }
  
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(115px, 1fr)); gap: 12px; }
  
  /* CARTÕES POKÉMON COM ANIMAÇÃO CHIC */
  .poke-card { background: #1a1a1a; border: 1.5px solid var(--border); border-radius: 14px; padding: 14px 8px 12px; text-align: center; cursor: pointer; transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative; user-select: none; }
  .poke-card:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 8px 20px rgba(0,0,0,0.4); border-color: #434343; }
  .poke-card.caught { background: var(--caught-bg); border-color: var(--caught-border); }
  .poke-card img { width: 74px; height: 74px; image-rendering: pixelated; display: block; margin: 0 auto; transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .poke-card:hover img { transform: scale(1.12); }
  
  .poke-card .poke-num { font-size: 11px; color: var(--text-muted); font-weight: bold; font-family: monospace; }
  .poke-card .poke-name { font-size: 13px; font-weight: 600; text-transform: capitalize; margin-top: 4px; color: #d9d9d9; }
  .poke-card.caught .poke-name { color: #fff; font-weight: 700; }
  .poke-card .poke-nick { font-size: 11px; color: #a0d911; font-weight: 700; margin-top: 4px; background: rgba(0,0,0,0.3); padding: 1px 6px; border-radius: 6px; border: 1px solid rgba(160,217,17,0.2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 92%; margin-left: auto; margin-right: auto; }
  
  .check-icon { position: absolute; top: 6px; right: 6px; width: 18px; height: 18px; background: var(--caught-check); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(82,196,26,0.5); animation: popCheck 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
  @keyframes popCheck { from { transform: scale(0); } to { transform: scale(1); } }
  .check-icon svg { width: 10px; height: 10px; stroke: #000; stroke-width: 3; }

  /* DASHBOARD DE ESTATÍSTICAS */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; text-align: center; box-shadow: var(--shadow); position: relative; }
  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: #434343; }
  .stat-card:nth-child(2)::before { background: var(--caught-check); }
  .stat-card:nth-child(3)::before { background: var(--red); }
  .stat-card:nth-child(4)::before { background: #1890ff; }
  .stat-num { font-size: 26px; font-weight: 800; color: #fff; line-height: 1.2; }
  .stat-label { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.6px; }

  /* PAINÉIS DE JOGOS (GAMES VIEW) */
  .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 24px; }
  .game-card { background: var(--bg-card); border-radius: 20px; border: 1.5px solid var(--border); overflow: hidden; box-shadow: var(--shadow); transition: all 0.2s ease; }
  .game-card:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(0,0,0,0.5); }
  .game-card-header { padding: 20px 20px 14px; display: flex; align-items: center; gap: 16px; }
  .game-logo { width: 56px; height: 76px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; background: #141414; border: 1px solid var(--border); }
  .game-logo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .game-logo .fallback-logo-box { font-size: 12px; font-weight: bold; text-transform: uppercase; color: var(--text-muted); text-align: center; padding: 4px; }
  
  .game-info { flex: 1; }
  .game-title { font-size: 16px; font-weight: 800; letter-spacing: -0.3px; }
  .game-year { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-top: 4px; background: #141414; display: inline-block; padding: 2px 8px; border-radius: 4px; border: 1px solid #262626; }

  .game-rival-row { padding: 0 20px 16px; display: flex; align-items: center; gap: 10px; }
  .game-rival-row label { font-size: 11px; color: var(--text-muted); white-space: nowrap; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .rival-input { flex: 1; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; color: var(--text); outline: none; background: var(--bg-input); transition: all 0.2s; }
  .rival-input:focus { border-color: var(--text-muted); background: #1a1a1a; }
  .rival-saved { font-size: 12px; color: var(--caught-check); font-weight: bold; opacity: 0; transition: opacity 0.3s; margin-left: 4px; }
  .rival-saved.show { opacity: 1; }

  .game-divider { height: 1px; background: var(--border); margin: 0 20px; }

  .game-team { padding: 18px 20px 20px; }
  .team-label { font-size: 11px; color: var(--text-muted); font-weight: 700; margin-bottom: 12px; letter-spacing: 0.8px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
  .team-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .team-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

  /* SLOTS DE TIME DO JOGADOR */
  .team-slot { background: #141414; border: 2px dashed #303030; border-radius: 12px; padding: 12px 6px; text-align: center; cursor: pointer; transition: all 0.2s; min-height: 106px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
  .team-slot:hover { border-color: #555; background: #1a1a1a; }
  .team-slot.filled { border-style: solid; border-color: #237804; background: linear-gradient(180deg, #132712 0%, #0e1e0d 100%); }
  .team-slot.filled:hover { border-color: var(--caught-check); box-shadow: 0 4px 12px rgba(82,196,26,0.15); }
  .team-slot img { width: 58px; height: 58px; image-rendering: pixelated; transition: transform 0.2s; }
  .team-slot.filled:hover img { transform: scale(1.1); }
  .team-slot .slot-name { font-size: 11px; text-transform: capitalize; color: #e8e8e8; margin-top: 4px; font-weight: 600; }
  .team-slot .slot-nick { font-size: 10px; color: #a0d911; font-weight: 700; background: rgba(0,0,0,0.4); padding: 1px 5px; border-radius: 4px; margin-top: 2px; max-width: 92%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; border: 1px solid rgba(160,217,17,0.15); }
  .team-slot .slot-empty-icon { font-size: 20px; color: #434343; font-weight: bold; transition: color 0.2s; }
  .team-slot:hover .slot-empty-icon { color: var(--text-muted); }
  
  .team-slot .slot-remove { position: absolute; top: -5px; right: -5px; width: 22px; height: 22px; background: #ff4d4f; border-radius: 50%; display: none; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 8px rgba(255,77,79,0.4); z-index: 10; transition: background 0.15s; }
  .team-slot .slot-remove:hover { background: var(--red-dark); }
  .team-slot .slot-remove svg { width: 10px; height: 10px; stroke: white; stroke-width: 3.5; }
  .team-slot.filled:hover .slot-remove { display: flex; }

  /* SELETOR (PICKER) E MODAIS DE CAPTURA */
  .picker-backdrop, .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); z-index: 600; align-items: center; justify-content: center; }
  .picker-backdrop.open, .modal-backdrop.open { display: flex; }
  
  .picker-modal, .modal { background: #1f1f1f; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.6); overflow: hidden; animation: modalPop 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  @keyframes modalPop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  
  .picker-modal { width: 520px; max-width: 95vw; max-height: 80vh; display: flex; flex-direction: column; }
  .picker-header { padding: 20px 24px; border-bottom: 1px solid var(--border); }
  .picker-header h3 { font-size: 17px; font-weight: 800; color: #fff; }
  .picker-header p { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
  .picker-search { padding: 14px 24px; border-bottom: 1px solid var(--border); position: relative; background: #171717; }
  .picker-search svg { position: absolute; left: 36px; top: 50%; transform: translateY(-50%); color: #595959; }
  .picker-search input { width: 100%; padding: 10px 14px 10px 42px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; color: white; background: var(--bg-input); outline: none; }
  .picker-search input:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(255,77,79,0.15); }
  
  .picker-list { overflow-y: auto; flex: 1; padding: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 8px; background: #1a1a1a; }
  .picker-item { background: #132712; border: 1.5px solid #237804; border-radius: 12px; padding: 8px 4px; text-align: center; cursor: pointer; transition: all 0.2s; }
  .picker-item:hover { border-color: var(--caught-check); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(82,196,26,0.3); }
  .picker-item img { width: 56px; height: 56px; image-rendering: pixelated; display: block; margin: 0 auto; }
  .picker-item .pi-name { font-size: 11px; text-transform: capitalize; font-weight: 600; color: #fff; }
  .picker-item .pi-nick { font-size: 10px; color: #a0d911; font-weight: 700; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .picker-footer { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; background: #171717; }
  
  /* MODAL DE CONTEXTO DE CAPTURA */
  .modal { width: 340px; max-width: 95vw; }
  .modal-header { background: #0f0f0f; padding: 24px 20px; text-align: center; color: white; position: relative; border-bottom: 3px solid var(--red); }
  .modal-header img { width: 96px; height: 96px; image-rendering: pixelated; filter: drop-shadow(0 6px 12px rgba(255,255,255,0.08)); }
  .modal-header h2 { font-size: 20px; text-transform: capitalize; margin-top: 8px; font-weight: 800; letter-spacing: -0.5px; }
  .modal-header p { font-size: 12px; color: var(--text-muted); font-weight: bold; font-family: monospace; }
  .modal-types { display: flex; gap: 6px; justify-content: center; margin-top: 10px; }
  .type-badge { font-size: 10px; padding: 3px 12px; border-radius: 20px; font-weight: 800; text-transform: uppercase; color: white; letter-spacing: 0.5px; }
  .modal-body { padding: 24px 20px; }
  .modal-body label { font-size: 11px; font-weight: 700; color: var(--text-muted); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.6px; }
  .modal-body input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; color: white; background: var(--bg-input); outline: none; transition: all 0.2s; }
  .modal-body input:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(255,77,79,0.15); }
  .modal-hint { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
  .modal-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 22px; }
  
  .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; text-align: center; }
  .btn-catch { background: var(--red); color: white; box-shadow: 0 4px 12px rgba(255,77,79,0.3); }
  .btn-catch:hover { background: var(--red-dark); }
  .btn-update { background: #389e0d; color: white; box-shadow: 0 4px 12px rgba(82,196,26,0.3); }
  .btn-update:hover { background: #237804; }
  .btn-release { background: #2a1215; color: #ff4d4f; border: 1.5px solid #58181c; }
  .btn-release:hover { background: #3c1418; }
  .btn-cancel { background: #262626; color: #d9d9d9; border: 1px solid var(--border); }
  .btn-cancel:hover { background: #333; }
  .btn-cancel-sm { padding: 8px 18px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; font-weight: 600; background: #262626; color: white; cursor: pointer; }
  .btn-cancel-sm:hover { background: #333; }

  /* IDENTIDADES DOS TIPOS POKÉMON */
  .t-normal{background:#A8A878} .t-fire{background:#F08030} .t-water{background:#6890F0}
  .t-electric{background:#F8D030;color:#141414} .t-grass{background:#78C850} .t-ice{background:#98D8D8;color:#141414}
  .t-fighting{background:#C03028} .t-poison{background:#A040A0} .t-ground{background:#E0C068;color:#141414}
  .t-flying{background:#A890F0} .t-psychic{background:#F85888} .t-bug{background:#A8B820}
  .t-rock{background:#B8A038} .t-ghost{background:#705898} .t-dragon{background:#7038F8}
  .t-dark{background:#705848} .t-steel{background:#B8B8D0;color:#141414} .t-fairy{background:#EE99AC}

  .empty-msg { text-align: center; padding: 48px 20px; color: var(--text-muted); font-size: 14px; font-weight: 500; }
  .loading-msg { text-align: center; padding: 60px 20px; }
  .loading-msg p { color: var(--text-muted); font-size: 14px; margin-top: 14px; font-weight: 600; }
  .spinner { width: 40px; height: 40px; border: 3.5px solid #262626; border-top-color: var(--red); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TELA DE LOGIN */
  #login-screen { position: fixed; inset: 0; background: radial-gradient(circle at 50% 20%, #1a1a1a 0%, #0d0d0d 70%); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
  #login-screen.hidden { display: none; }
  .login-box { width: 100%; max-width: 360px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 32px 28px 28px; animation: fadeIn 0.35s ease-out; }
  .login-ball { width: 52px; height: 52px; background: #fff; border-radius: 50%; position: relative; margin: 0 auto 18px; box-shadow: 0 0 20px rgba(255,77,79,0.45); }
  .login-ball::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 6px; background: var(--red); transform: translateY(-50%); }
  .login-ball::after { content: ''; position: absolute; top: 50%; left: 50%; width: 18px; height: 18px; background: #fff; border: 4px solid #141414; border-radius: 50%; transform: translate(-50%, -50%); }
  .login-title { font-size: 19px; font-weight: 800; text-align: center; letter-spacing: -0.3px; }
  .login-sub { font-size: 13px; color: var(--text-muted); text-align: center; margin-top: 4px; margin-bottom: 22px; }
  .login-field { margin-bottom: 14px; }
  .login-field label { display: block; font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .login-field input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; color: var(--text); background: var(--bg-input); outline: none; transition: all 0.2s; }
  .login-field input:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(255,77,79,0.15); }
  .login-error { font-size: 13px; color: var(--red); text-align: center; min-height: 18px; margin: 2px 0 10px; font-weight: 600; }
  .login-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; background: linear-gradient(90deg, var(--red), var(--red-dark)); color: #fff; font-size: 14px; font-weight: 800; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 14px rgba(255,77,79,0.3); }
  .login-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
  .login-btn:disabled { opacity: 0.6; cursor: default; transform: none; }
  .app-wrap { display: none; }
  .app-wrap.ready { display: block; }

  /* USUÁRIO LOGADO NO HEADER */
  .user-chip { display: flex; align-items: center; gap: 10px; margin-left: auto; }
  .user-chip span { font-size: 13px; font-weight: 700; color: var(--text-muted); }
  .logout-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-input); color: var(--text-muted); font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .logout-btn:hover { color: var(--red); border-color: var(--red); }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-ball"></div>
    <div class="login-title">Living Dex Tracker</div>
    <div class="login-sub">Entre com seu usuário e senha</div>
    <form id="login-form" onsubmit="return false;">
      <div class="login-field">
        <label for="login-user">Usuário</label>
        <input type="text" id="login-user" autocomplete="username" placeholder="seu usuário">
      </div>
      <div class="login-field">
        <label for="login-pass">Senha</label>
        <input type="password" id="login-pass" autocomplete="current-password" placeholder="••••••••">

</div>

<div class="app-wrap" id="app-wrap">

<header>
  <div class="header-top">
    <div class="pokeball-icon"></div>
    <div class="header-title">
      <h1>Living Dex Tracker</h1>
      <p id="header-sub">Carregando Pokédex...</p>
    </div>

      <button class="logout-btn" onclick="handleLogout()">Sair</button>

  <div class="progress-bar-wrap">

    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchPage('dex')">Pokédex</button>
    <button class="nav-tab" onclick="switchPage('games')">Games</button>
  </div>
</header>

<div class="controls" id="dex-controls">
  <div class="search-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search" placeholder="Buscar por nome, número ou apelido..." oninput="applyFilters()">
  </div>
  <select id="gen-filter" onchange="applyFilters()">
    <option value="all">Todas as gerações</option>
    <option value="0">Gen I — Kanto (1–151)</option>
    <option value="1">Gen II — Johto (152–251)</option>
    <option value="2">Gen III — Hoenn (252–386)</option>
    <option value="3">Gen IV — Sinnoh (387–493)</option>
    <option value="4">Gen V — Unova (494–649)</option>
    <option value="5">Gen VI — Kalos (650–721)</option>
    <option value="6">Gen VII — Alola (722–809)</option>

  <div class="filter-btns">

    <button class="filter-btn" id="btn-caught" onclick="setView('caught')">Capturados</button>
    <button class="filter-btn" id="btn-missing" onclick="setView('missing')">Faltando</button>

</div>

<main>
  <div class="page active" id="page-dex">
    <div class="loading-msg" id="dex-loading">
      <div class="spinner"></div>
      <p>A comunicar com o Supabase...</p>
    </div>
    <div id="dex-content"></div>
  </div>

  <div class="page" id="page-games">
    <div class="games-grid" id="games-grid"></div>
  </div>
</main>

<div class="modal-backdrop" id="modal-backdrop" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <img id="modal-img" src="" alt="">
      <h2 id="modal-name"></h2>
      <p id="modal-num"></p>
      <div class="modal-types" id="modal-types"></div>
    </div>
    <div class="modal-body">
      <label for="nick-input">Apelido</label>
      <input type="text" id="nick-input" placeholder="Ex: Charminho, Squirtle Rei..." maxlength="24">
      <p class="modal-hint">Deixe em branco para não dar apelido.</p>
      <div class="modal-actions" id="modal-actions"></div>

</div>

<div class="picker-backdrop" id="picker-backdrop" onclick="closePickerOutside(event)">

    <div class="picker-header">
      <h3>Escolher Pokémon</h3>
      <p>Selecione um dos seus Pokémon capturados</p>
    </div>
    <div class="picker-search">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="picker-search-input" placeholder="Buscar por nome ou apelido..." oninput="renderPickerList()">
    </div>
    <div class="picker-list" id="picker-list"></div>
    <div class="picker-footer">
      <button class="btn-cancel-sm" onclick="closePicker()">Cancelar</button>
    </div>
  </div>
</div>

</div><!-- /app-wrap -->

<script>
// ─── SUPABASE SETUP ─────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://gulrejopxbptexismeft.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3swzbU6nl_foUyGKUPhPLQ_I-H099kj';
const dbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ─── DATA ───────────────────────────────────────────────────────────────────
const GENERATIONS = [
  { label: 'Geração I — Kanto', start: 1, end: 151 },
  { label: 'Geração II — Johto', start: 152, end: 251 },
  { label: 'Geração III — Hoenn', start: 252, end: 386 },
  { label: 'Geração IV — Sinnoh', start: 387, end: 493 },
  { label: 'Geração V — Unova', start: 494, end: 649 },
  { label: 'Geração VI — Kalos', start: 650, end: 721 },
  { label: 'Geração VII — Alola', start: 722, end: 809 },
  { label: 'Geração VIII — Galar', start: 810, end: 905 },
  { label: 'Geração IX — Paldea', start: 906, end: 1025 },
];

const GAMES = [
  { id: 'rby',   color: '#e53935' },
  { id: 'gsc',   color: '#f9a825' },
  { id: 'rse',   color: '#c62828' },
  { id: 'frlg',  color: '#bf360c' },
  { id: 'dppt',  color: '#283593' },
  { id: 'pt',    color: '#283593' },
  { id: 'hgss',  color: '#f57f17' },
  { id: 'bw',    color: '#37474f' },
  { id: 'bw2',   color: '#455a64' },
  { id: 'b2w2',  color: '#455a64' },
  { id: 'xy',    color: '#1565c0' },
  { id: 'oras',  color: '#6a1b9a' },
  { id: 'sm',    color: '#e65100' },
  { id: 'usum',  color: '#4a148c' },
  { id: 'swsh',  color: '#1b5e20' },
  { id: 'bdsp',  color: '#0d47a1' },
  { id: 'pla',   color: '#4e342e' },
  { id: 'sv',    color: '#880e4f' },
  { id: 'plza',  color: '#212121' },
];

// ─── STATE ───────────────────────────────────────────────────────────────────
let allPokemon = [];
let caught = {};
let gamesData = {};   
let view = 'all';
let selectedId = null;
let typeCache = {};
let currentPage = 'dex';
let pickerGameId = null;
let pickerSlotIdx = null;
let currentUser = null; // { username }

// ─── AUTH ────────────────────────────────────────────────────────────────────
const AUTH_STORAGE_KEY = 'livingdex_session';
const LOGIN_FUNCTION_URL = 'https://gulrejopxbptexismeft.supabase.co/functions/v1/login';

// Confere usuário/senha chamando a Edge Function (a senha nunca é checada no navegador).
async function handleLogin() {
  const userInput = document.getElementById('login-user').value.trim();
  const passInput = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  errEl.textContent = '';

  if (!userInput || !passInput) {
    errEl.textContent = 'Preencha usuário e senha.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Entrando...';

  try {
    const res = await fetch(LOGIN_FUNCTION_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: userInput, password: passInput }),
    });
    const result = await res.json();

    if (!res.ok || !result.ok) {
      errEl.textContent = result.error || 'Usuário ou senha inválidos.';
      return;
    }

    currentUser = { username: result.username };
    localStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify(currentUser));
    await enterApp();
  } catch (err) {
    console.error('Erro ao validar login:', err);
    errEl.textContent = 'Erro ao comunicar com o servidor. Tente novamente.';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}

function handleLogout() {
  currentUser = null;
  localStorage.removeItem(AUTH_STORAGE_KEY);
  // Limpa estado em memória para não vazar dados de um usuário pro próximo.
  caught = {};
  gamesData = {};
  document.getElementById('login-pass').value = '';
  document.getElementById('app-wrap').classList.remove('ready');
  document.getElementById('login-screen').classList.remove('hidden');
}

// Tenta restaurar uma sessão salva no navegador (login automático).
function restoreSession() {
  const raw = localStorage.getItem(AUTH_STORAGE_KEY);
  if (!raw) return null;
  try {
    return JSON.parse(raw);
  } catch {
    localStorage.removeItem(AUTH_STORAGE_KEY);
    return null;
  }
}

async function enterApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-wrap').classList.add('ready');
  document.getElementById('user-chip-name').textContent = currentUser.username;
  await startAppData();
}

document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
document.getElementById('login-user').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('login-pass').focus(); });

// ─── SUPABASE: FETCH DATA ────────────────────────────────────────────────────
async function loadData() {
  try {
    const { data: caughtData, error: caughtError } = await dbClient
      .from('caught_pokemon').select('*').eq('user_id', currentUser.username);
    if (!caughtError && caughtData) {
      caughtData.forEach(row => {
        caught[row.id] = { nick: row.nick, ts: row.ts };
      });
    }

    const { data: gamesDbData, error: gamesError } = await dbClient
      .from('games_data').select('*').eq('user_id', currentUser.username);
    if (!gamesError && gamesDbData) {
      gamesDbData.forEach(row => {
        const teamArray = row.team ? row.team : [null,null,null,null,null,null];
        gamesData[row.id] = { 
          id: row.id,
          title: row.game_name, 
          rival: row.rival || '', 
          team: teamArray, 
          cover_url: row.cover_url,
          year: row.year || '----',
          color: row.color || '#424242',
          gen: row.gen || 0
        };
      });
    }
  } catch (err) {
    console.error("Erro ao carregar do banco:", err);
    throw err;
  }
}

// ─── SUPABASE: GAMES SYNC ────────────────────────────────────────────────────
async function syncGameToSupabase(gameId) {
  const gd = gamesData[gameId];
  const { data, error } = await dbClient.from('games_data').upsert({
    id: gameId,
    user_id: currentUser.username,
    rival: gd.rival || '',
    team: gd.team
  }, { onConflict: 'id,user_id' });

  if (error) {
    console.error("Erro ao salvar o jogo no Supabase:", error);
  }
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function spriteUrl(id) { return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`; }
async function fetchAll() {
  const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025&offset=0');
  const data = await res.json();
  return data.results.map((p, i) => ({ id: i + 1, name: p.name }));
}
async function fetchTypes(id) {
  if (typeCache[id]) return typeCache[id];
  try {
    const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
    const d = await r.json();
    const types = d.types.map(t => t.type.name);
    typeCache[id] = types;
    return types;
  } catch(e) { return []; }
}

// ─── UI: HEADER & PAGE SWITCH ────────────────────────────────────────────────
function updateHeader() {
  const total = allPokemon.length;
  const cnt = Object.keys(caught).length;
  const pct = total > 0 ? Math.round(cnt / total * 100) : 0;
  document.getElementById('prog-label-left').textContent = `${cnt} de ${total} capturados`;
  document.getElementById('prog-label-right').textContent = `${pct}%`;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('header-sub').textContent = `${total} Pokémon • ${cnt} capturados`;
}

function switchPage(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.nav-tab')[page === 'dex' ? 0 : 1].classList.add('active');
  document.getElementById('dex-controls').style.display = page === 'dex' ? 'flex' : 'none';
  if (page === 'games') renderGames();
}

// ─── UI: DEX ─────────────────────────────────────────────────────────────────
function setView(v) {
  view = v;
  ['all','caught','missing'].forEach(x => { document.getElementById('btn-' + x).classList.toggle('active', x === v); });
  applyFilters();
}

// Aplicação de filtros de busca e geração
function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const genVal = document.getElementById('gen-filter').value;
  let pool = allPokemon;
  if (genVal !== 'all') {
    const gen = GENERATIONS[parseInt(genVal)];
    pool = pool.filter(p => p.id >= gen.start && p.id <= gen.end);
  }
  if (view === 'caught')  pool = pool.filter(p => caught[p.id]);
  if (view === 'missing') pool = pool.filter(p => !caught[p.id]);
  if (q) pool = pool.filter(p =>
    p.name.includes(q) || String(p.id).includes(q) || (caught[p.id]?.nick || '').toLowerCase().includes(q)
  );
  renderDex(pool, genVal !== 'all' || q || view !== 'all');
}

function renderDex(pool, flat) {
  const container = document.getElementById('dex-content');
  if (pool.length === 0) { container.innerHTML = `<div class="empty-msg">Nenhum Pokémon encontrado.</div>`; return; }
  const total = allPokemon.length, cnt = Object.keys(caught).length;
  let html = '';
  if (!flat) {
    const pct = total > 0 ? Math.round(cnt / total * 100) : 0;
    html += `<div class="stats-grid">
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Total</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--caught-check)">${cnt}</div><div class="stat-label">Capturados</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--red)">${total-cnt}</div><div class="stat-label">Faltando</div></div>
      <div class="stat-card"><div class="stat-num">${pct}%</div><div class="stat-label">Completo</div></div>
    </div>`;
    for (const gen of GENERATIONS) {
      const gp = pool.filter(p => p.id >= gen.start && p.id <= gen.end);
      if (!gp.length) continue;
      const gc = gp.filter(p => caught[p.id]).length;
      const gpct = Math.round(gc / gp.length * 100);
      html += `<div class="gen-section">
        <div class="gen-header">
          <span class="gen-title">${gen.label}</span>
          <span class="gen-sub">${gc}/${gp.length}</span>
          <div class="gen-progress"><div class="gen-progress-fill" style="width:${gpct}%"></div></div>
        </div>
        <div class="grid">${gp.map(cardHtml).join('')}</div>
      </div>`;
    }
  } else {
    html += `<div class="grid">${pool.map(cardHtml).join('')}</div>`;
  }
  container.innerHTML = html;
}

function cardHtml(p) {
  const c = caught[p.id];
  const nick = c?.nick || '';
  return `<div class="poke-card ${c ? 'caught' : ''}" onclick="openModal(${p.id})">
    ${c ? `<div class="check-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>` : ''}
    <img src="${spriteUrl(p.id)}" alt="${p.name}" loading="lazy">
    <div class="poke-num">#${String(p.id).padStart(4,'0')}</div>
    <div class="poke-name">${p.name}</div>
    ${nick ? `<div class="poke-nick">${nick}</div>` : ''}
  </div>`;
}

// ─── CATCH MODAL ─────────────────────────────────────────────────────────────
async function openModal(id) {
  selectedId = id;
  const p = allPokemon.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modal-img').src = spriteUrl(id);
  document.getElementById('modal-name').textContent = p.name;
  document.getElementById('modal-num').textContent = `#${String(id).padStart(4,'0')}`;
  document.getElementById('modal-types').innerHTML = '';
  document.getElementById('nick-input').value = caught[id]?.nick || '';
  const isCaught = !!caught[id];
  document.getElementById('modal-actions').innerHTML = isCaught
    ? `<button class="btn btn-update" onclick="catchPoke()">Atualizar</button>
       <button class="btn btn-release" onclick="releasePoke()">Soltar</button>
       <button class="btn btn-cancel" onclick="closeModal()">Fechar</button>`
    : `<button class="btn btn-catch" onclick="catchPoke()">Capturar!</button>
       <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>`;
  document.getElementById('modal-backdrop').classList.add('open');
  document.getElementById('nick-input').focus();
  fetchTypes(id).then(types => {
    document.getElementById('modal-types').innerHTML = types.map(t => `<span class="type-badge t-${t}">${t}</span>`).join('');
  });
}
function closeModal() { document.getElementById('modal-backdrop').classList.remove('open'); selectedId = null; }
function closeModalOutside(e) { if (e.target.id === 'modal-backdrop') closeModal(); }

async function catchPoke() {
  if (!selectedId) return;
  const nickValue = document.getElementById('nick-input').value.trim();
  const tsValue = new Date().toISOString(); 
  const idToSave = selectedId;

  caught[idToSave] = { nick: nickValue, ts: tsValue };
  closeModal(); 
  updateHeader(); 
  applyFilters();

  const { data, error } = await dbClient.from('caught_pokemon').upsert({ 
    id: idToSave, user_id: currentUser.username, nick: nickValue, ts: tsValue 
  }, { onConflict: 'id,user_id' });
  if (error) alert("Erro ao gravar no banco: " + error.message);
}

async function releasePoke() {
  if (!selectedId) return;
  const idToRemove = selectedId;
  const gamesToUpdate = [];

  Object.values(gamesData).forEach(g => {
    if (g.team && g.team.includes(idToRemove)) {
      g.team = g.team.map(id => id == idToRemove ? null : id);
      gamesToUpdate.push(g.id);
    }
  });

  delete caught[idToRemove];
  closeModal(); 
  updateHeader(); 
  applyFilters();

  await dbClient.from('caught_pokemon').delete().eq('id', idToRemove).eq('user_id', currentUser.username);
  for (const gid of gamesToUpdate) await syncGameToSupabase(gid);
}

document.getElementById('nick-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') catchPoke();
  if (e.key === 'Escape') closeModal();
});

// ─── UI: GAMES ───────────────────────────────────────────────────────────────
function renderGames() {
  const grid = document.getElementById('games-grid');
  const ordem = GAMES.map(g => g.id);
  const jogosNoBanco = Object.values(gamesData)
    .sort((a, b) => {
      let idxA = ordem.indexOf(a.id);
      let idxB = ordem.indexOf(b.id);
      return (idxA === -1 ? 999 : idxA) - (idxB === -1 ? 999 : idxB);
    });

  grid.innerHTML = jogosNoBanco.map(g => gameCardHtml(g)).join('');
}

function gameCardHtml(g) {
  const gd = gamesData[g.id];
  if(!gd) return '';
  const rival = gd.rival || '';
  const teamSlots = gd.team.map((pid, idx) => teamSlotHtml(g.id, pid, idx)).join('');
  
  const staticGame = GAMES.find(x => x.id === g.id) || {};
  const color = gd.color || staticGame.color || '#424242';
  const nomeDoJogo = gd.title || 'Jogo Desconhecido';

  const capaImagem = gd.cover_url 
    ? `<img src="${gd.cover_url}" alt="${nomeDoJogo}" loading="lazy" onerror="this.outerHTML='<div class=\'fallback-logo-box\'>${nomeDoJogo.substring(0,3)}</div>'">`
    : `<div class="fallback-logo-box">${nomeDoJogo.substring(0,3)}</div>`;

  return `
  <div class="game-card" id="gamecard-${g.id}" style="border-color: ${color}; box-shadow: 0 4px 14px ${color}15;">
    <div class="game-card-header">
      <div class="game-logo" style="box-shadow: 0 0 10px ${color}25; border-color: ${color}44;">
        ${capaImagem}
      </div>
      <div class="game-info">
        <div class="game-title" style="color:${color}">${nomeDoJogo}</div>
        <div class="game-year">${gd.year}</div>
      </div>
    </div>
    <div class="game-rival-row">
      <label>Rival:</label>
      <input class="rival-input" type="text" placeholder="Nome do rival..." maxlength="20"
        value="${rival}" oninput="saveRival('${g.id}', this.value)">
      <span class="rival-saved" id="rival-saved-${g.id}">Salvo</span>
    </div>
    <div class="game-divider"></div>
    <div class="game-team">
      <div class="team-label">Meu Time</div>
      <div class="team-slots" id="team-${g.id}">${teamSlots}</div>
    </div>
  </div>`;
}

function teamSlotHtml(gameId, pokeId, idx) {
  if (!pokeId) return `<div class="team-slot" onclick="openPicker('${gameId}', ${idx})"><div class="slot-empty-icon">+</div></div>`;
  const p = allPokemon.find(x => x.id == pokeId);
  if (!p) return `<div class="team-slot" onclick="openPicker('${gameId}', ${idx})"><div class="slot-empty-icon">?</div></div>`;
  const nick = caught[pokeId]?.nick || '';
  return `<div class="team-slot filled" onclick="openPicker('${gameId}', ${idx})">
    <div class="slot-remove" onclick="removeFromTeam(event,'${gameId}',${idx})">
      <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <img src="${spriteUrl(pokeId)}" alt="${p.name}" loading="lazy">
    <div class="slot-name">${p.name}</div>
    ${nick ? `<div class="slot-nick">${nick}</div>` : ''}
  </div>`;
}

function refreshGameCard(gameId) {
  const g = gamesData[gameId];
  const card = document.getElementById('gamecard-' + gameId);
  if (!g || !card) return;
  const slotsContainer = document.getElementById('team-' + gameId);
  if (slotsContainer) {
    slotsContainer.innerHTML = g.team.map((pid, idx) => teamSlotHtml(gameId, pid, idx)).join('');
  }
}

let rivalSaveTimers = {};
async function saveRival(gameId, value) {
  gamesData[gameId].rival = value;
  clearTimeout(rivalSaveTimers[gameId]);
  rivalSaveTimers[gameId] = setTimeout(async () => {
    await syncGameToSupabase(gameId);
    const el = document.getElementById('rival-saved-' + gameId);
    if (el) { el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2000); }
  }, 1000);
}

async function removeFromTeam(event, gameId, idx) {
  event.stopPropagation();
  gamesData[gameId].team[idx] = null;
  refreshGameCard(gameId);
  await syncGameToSupabase(gameId);
}

// ─── UI: PICKER ──────────────────────────────────────────────────────────────
function openPicker(gameId, slotIdx) {
  pickerGameId = gameId; pickerSlotIdx = slotIdx;
  document.getElementById('picker-search-input').value = '';
  document.getElementById('picker-backdrop').classList.add('open');
  renderPickerList(); document.getElementById('picker-search-input').focus();
}
function closePicker() { document.getElementById('picker-backdrop').classList.remove('open'); pickerGameId = null; pickerSlotIdx = null; }
function closePickerOutside(e) { if (e.target.id === 'picker-backdrop') closePicker(); }

function renderPickerList() {
  const q = document.getElementById('picker-search-input').value.toLowerCase().trim();
  const currentTeam = gamesData[pickerGameId]?.team || [];
  let pool = allPokemon.filter(p => caught[p.id]);
  if (q) pool = pool.filter(p => p.name.includes(q) || (caught[p.id]?.nick || '').toLowerCase().includes(q));

  const list = document.getElementById('picker-list');
  if (pool.length === 0) {
    list.innerHTML = `<div class="picker-empty">${Object.keys(caught).length === 0 ? 'Nenhum Pokémon capturado ainda.' : 'Nenhum Pokémon encontrado.'}</div>`;
    return;
  }

  list.innerHTML = pool.map(p => {
    const nick = caught[p.id]?.nick || '';
    const inTeam = currentTeam.some((tid, i) => tid == p.id && i !== pickerSlotIdx);
    return `<div class="picker-item" ${inTeam ? 'style="opacity:0.35;cursor:default"' : ''} onclick="${inTeam ? '' : `pickPokemon(${p.id})`}">
      <img src="${spriteUrl(p.id)}" alt="${p.name}" loading="lazy">
      <div class="pi-name">${p.name}</div>
      ${nick ? `<div class="pi-nick">${nick}</div>` : ''}
    </div>`;
  }).join('');
}

async function pickPokemon(pokeId) {
  if (!pickerGameId && pickerSlotIdx === null) return;
  gamesData[pickerGameId].team[pickerSlotIdx] = pokeId;
  refreshGameCard(pickerGameId);
  closePicker();
  await syncGameToSupabase(pickerGameId);
}

document.getElementById('picker-search-input').addEventListener('keydown', e => { if (e.key === 'Escape') closePicker(); });

// ─── INIT DE DADOS DO APP (chamado após login) ────────────────────────────────
async function startAppData() {
  document.getElementById('dex-loading').style.display = '';
  document.getElementById('dex-loading').innerHTML = `<div class="spinner"></div><p>A comunicar com o Supabase...</p>`;
  try {
    await loadData();
  } catch(err) {
    document.getElementById('dex-loading').innerHTML = `
      <div class="empty-msg" style="color:var(--red);">
        <b>Erro de comunicação com a Base de Dados.</b><br><br>
        Ocorreu uma falha ao tentar descarregar as gravações.
      </div>`;
    return;
  }
  
  try {
    allPokemon = await fetchAll();
    document.getElementById('dex-loading').style.display = 'none';
    updateHeader();
    applyFilters();
  } catch(err) {
    document.getElementById('dex-loading').innerHTML = `<div class="empty-msg">Erro ao carregar a lista da PokeAPI.<br>Verifique a sua ligação à internet.</div>`;
  }
}

// ─── INIT GERAL: decide entre tela de login ou sessão restaurada ─────────────
(async function init() {
  const saved = restoreSession();
  if (saved && saved.username) {
    currentUser = saved;
    await enterApp();
  } else {
    document.getElementById('login-user').focus();
  }
})();
</script>
</body>
